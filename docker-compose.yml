version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: doc_erp_db
    environment:
      POSTGRES_DB: doc_erp_db
      POSTGRES_USER: docerp
      POSTGRES_PASSWORD: docerp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docerp -d doc_erp_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - doc_erp_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_erp_api
    environment:
      DATABASE_URL: postgresql+asyncpg://docerp:docerp_password@db:5432/doc_erp_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      MAX_CONTENT_SIZE_MB: ${MAX_CONTENT_SIZE_MB:-5}
      DEBUG: ${DEBUG:-true}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        cd /app &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - doc_erp_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  doc_erp_network:
    driver: bridge
